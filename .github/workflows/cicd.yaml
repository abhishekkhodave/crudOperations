name: Full Stack CI/CD (Self-Hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- PRE-CLEANUP ----------
      - name: Cleanup Docker on self-hosted runner
        run: |
          docker system prune -af
          docker builder prune -af

      # ---------- CHECKOUT ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- BACKEND ----------
      - name: Build Backend Docker Image
        working-directory: bootrestbook
        run: |
          docker build -t book-backend .

      # ---------- FRONTEND ----------
      - name: Build Frontend Docker Image
        working-directory: bookApplication
        run: |
          docker build -t book-frontend .

      # ---------- DEPLOY ----------
      - name: Deploy using Docker Compose
        run: |
          docker compose down
          docker compose up -d

