<div class="container">

    <h2>📚 Book Management</h2>
  
    <!-- Add Book -->
    <div class="card">
      <h3>Add Book</h3>
      <input type="text" placeholder="Title" [(ngModel)]="selectedBook.title">
      <input type="text" placeholder="Author" [(ngModel)]="selectedBook.author">
      <button (click)="createBook()">Add Book</button>
    </div>
  
    <!-- Book List -->
    <div class="card">
      <h3>Book List</h3>
      <table>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Author</th>
          <th>Actions</th>
        </tr>
        <tr *ngFor="let book of books">
          <td>{{ book.id }}</td>
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>
            <button (click)="getBookById(book.id)">View</button>
            <button (click)="updateBook(book.id)">Update</button>
            <button class="delete" (click)="deleteBook(book.id)">Delete</button>
          </td>
        </tr>
      </table>
    </div>
  
    <!-- Selected Book -->
    <div class="card" *ngIf="selectedBook?.id">
      <h3>Selected Book</h3>
      <p><strong>ID:</strong> {{ selectedBook.id }}</p>
      <p><strong>Title:</strong> {{ selectedBook.title }}</p>
      <p><strong>Author:</strong> {{ selectedBook.author }}</p>
    </div>
  
  </div>
